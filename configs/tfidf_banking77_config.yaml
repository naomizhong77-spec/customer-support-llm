# Baseline 1 (BANKING77) — TF-IDF + LogisticRegression
# Design mirrors configs/tfidf_config.yaml exactly — same hyperparameters so the
# only variable is the dataset (Bitext vs BANKING77). Any accuracy delta is
# attributable to the dataset's difficulty (77 fine-grained classes vs Bitext's 27).

data:
  train_path: data/banking77/processed/train.parquet
  val_path: data/banking77/processed/val.parquet
  test_path: data/banking77/processed/test.parquet
  text_column: text
  label_column: label_name

vectorizer:
  ngram_range: [1, 2]
  min_df: 2
  max_df: 0.95
  sublinear_tf: true
  lowercase: true

classifier:
  solver: saga
  multi_class: multinomial
  C: 1.0
  max_iter: 1000
  n_jobs: -1
  random_state: 42

artifacts:
  checkpoint_dir: checkpoints/tfidf_banking77
  metrics_root: outputs/metrics
  figures_dir: outputs/figures
  error_analysis_dir: outputs/error_analysis

runtime:
  seed: 42
  n_latency_samples: 500
  n_latency_warmup: 50
  model_name: TF-IDF + LR (BANKING77)
  model_family: traditional-ml
  # Cross-model test-set pinning: full sha256 of the raw test.parquet bytes.
  # All three BANKING77 models (TF-IDF, DistilBERT, Qwen QLoRA) must record the
  # same value in results.json.test_set_hash to prove identical evaluation data.
  # NOTE: This intentionally differs from the Bitext scripts' sorted-CSV
  # truncated digest. Cross-dataset hash methods need only be internally
  # consistent per dataset; for BANKING77 we use the file-bytes method so the
  # pin is verifiable with `sha256sum data/banking77/processed/test.parquet`.
  # The DistilBERT and Qwen BANKING77 scripts MUST reuse the test_set_hash()
  # function from scripts/train_tfidf_banking77.py verbatim.
  expected_test_set_hash: sha256:6b7f43ccbe394d73310fa8d23ac97cebf9ce1292e989bca5f6001c52d8e33ddc
